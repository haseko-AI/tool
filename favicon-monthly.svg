<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>
  <!-- グラフバー -->
  <rect x="4" y="20" width="4" height="8" rx="1" fill="white" opacity="0.9"/>
  <rect x="10" y="15" width="4" height="13" rx="1" fill="white" opacity="0.9"/>
  <rect x="16" y="18" width="4" height="10" rx="1" fill="white" opacity="0.9"/>
  <rect x="22" y="11" width="4" height="17" rx="1" fill="white" opacity="0.9"/>
  <!-- 上部ラベル -->
  <text x="4" y="9" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="7" fill="white" letter-spacing="0.2">月報</text>
  <!-- ドット -->
  <circle cx="29" cy="7" r="1.5" fill="white" opacity="0.7"/>
</svg>
