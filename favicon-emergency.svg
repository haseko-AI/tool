<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>
  <!-- 警告三角形 -->
  <polygon points="16,5 28,26 4,26" fill="white" opacity="0.15"/>
  <polygon points="16,7 27,25 5,25" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  <!-- ！マーク -->
  <rect x="15" y="13" width="2" height="7" rx="1" fill="white" opacity="0.95"/>
  <circle cx="16" cy="23" r="1.2" fill="white" opacity="0.95"/>
</svg>
