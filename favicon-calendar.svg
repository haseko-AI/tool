<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>
  <!-- カレンダー枠 -->
  <rect x="4" y="8" width="24" height="20" rx="2" fill="white" opacity="0.15"/>
  <!-- カレンダー上部バー -->
  <rect x="4" y="8" width="24" height="6" rx="2" fill="white" opacity="0.3"/>
  <!-- 留め具 -->
  <rect x="10" y="5" width="2.5" height="6" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="19.5" y="5" width="2.5" height="6" rx="1.5" fill="white" opacity="0.9"/>
  <!-- 日付ドット -->
  <circle cx="9"  cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="16" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="23" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="9"  cy="26" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="16" cy="26" r="2"   fill="white" opacity="1"/>
  <circle cx="23" cy="26" r="1.5" fill="white" opacity="0.8"/>
</svg>
